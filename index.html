<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Mobile-optimised viewport — prevents zoom on input focus (iOS) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Royal ERP">
    <meta name="theme-color" content="#0f172a">

    <title>Royal ERP — Tiles & Granites</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- App icons for iOS home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "html5-qrcode": "https://esm.sh/html5-qrcode@^2.3.8",
        "qrcode": "https://esm.sh/qrcode@^1.5.3",
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
      }
    }
    </script>

    <style>
      /* ── Mobile global fixes ─────────────────────────────── */

      /* Prevent body scroll bounce on iOS */
      html, body { height: 100%; overflow: hidden; }
      #root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }

      /* Safe area insets for iPhone notch / Dynamic Island */
      .safe-top    { padding-top:    env(safe-area-inset-top);    }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
      .safe-left   { padding-left:   env(safe-area-inset-left);   }
      .safe-right  { padding-right:  env(safe-area-inset-right);  }

      /* Prevent text size adjustment on orientation change */
      * { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

      /* Smooth scrolling inside scrollable containers */
      .overflow-y-auto, .overflow-x-auto {
        -webkit-overflow-scrolling: touch;
      }

      /* Remove tap highlight flicker on mobile */
      * { -webkit-tap-highlight-color: transparent; }

      /* Better touch targets — minimum 44px for accessibility */
      button, a, input[type="checkbox"], input[type="radio"] {
        min-height: 44px;
      }

      /* Input zoom prevention — iOS zooms in when font-size < 16px */
      input, select, textarea {
        font-size: 16px !important;
      }

      /* Print: hide mobile chrome when printing */
      @media print {
        .no-print { display: none !important; }
        body { overflow: visible !important; }
        #root { overflow: visible !important; height: auto !important; }
      }
    </style>
</head>
<body class="bg-slate-950 text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
