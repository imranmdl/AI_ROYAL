name: Build Royal ERP APK

on:
  push:
    branches: [main]
  workflow_dispatch:    # also allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build the web app ──────────────────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 5. Setup Java ─────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 6. Setup Android SDK ──────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Sync Capacitor to Android ──────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 8. Build debug APK (for testing) ──────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 9. Rename APK with date + commit ──────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "RoyalERP-v1.0-${DATE}-${SHORT_SHA}.apk"

      # ── 10. Upload APK as artifact (downloadable for 30 days) ─────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RoyalERP-APK
          path: RoyalERP-*.apk
          retention-days: 30

      # ── 11. Create GitHub Release if tagged ───────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: RoyalERP-*.apk
          name: Royal ERP ${{ github.ref_name }}
          body: |
            ## Royal ERP Mobile App
            
            ### Installation
            1. Download `RoyalERP-*.apk` below
            2. On your Android phone: Settings → Security → Allow Unknown Sources
            3. Open the downloaded APK and install
            4. Scan your shop QR code to configure
            
            ### What's included
            - Full ERP: Inventory, Sales, Quotations, P&L
            - Kadapa & Granite Manager
            - Public Gallery
            - Multi-tenant with QR configuration
